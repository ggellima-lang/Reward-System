<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root { --accent-blue: #4f8ef7; --accent-blue-hover: #3a7ef0; --accent-green: #00f5c4; --accent-red: #ff4d6d; --text-secondary: #6b7a99; --text-muted: #4a5568; --border-secondary: rgba(255,255,255,0.07); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .topbar { width: 100%; padding: 1.2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(6,9,18,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
        .topbar-brand { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; }
        .topbar-back { font-size: 0.82rem; color: #6b7a99; text-decoration: none; }
        .topbar-back:hover { color: #eef2ff; }
        .admin-badge { background: rgba(0,245,196,0.1); border: 1px solid rgba(0,245,196,0.3); color: var(--accent-green); font-size: 0.7rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.08em; }
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 3rem 2.5rem; max-width: 520px; width: 100%; margin: 0 auto; }
        .page-heading { margin-bottom: 2rem; }
        .page-heading h1 { font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
        .page-heading p { color: #6b7a99; font-size: 0.92rem; }
        .username-chip { display: inline-block; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.25); color: #4f8ef7; border-radius: 20px; padding: 4px 14px; font-size: 0.82rem; font-weight: 700; margin-bottom: 1.5rem; }
        .server-error { background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); color: var(--accent-red); border-radius: 12px; padding: 14px 18px; font-size: 0.92rem; margin-bottom: 1.2rem; }
        .server-success { background: rgba(0,245,196,0.08); border: 1px solid rgba(0,245,196,0.25); color: var(--accent-green); border-radius: 12px; padding: 14px 18px; font-size: 0.92rem; margin-bottom: 1.2rem; font-weight: 500; }
        .field-wrap { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        label { font-size: 0.78rem; font-weight: 600; color: #6b7a99; padding-left: 4px; display: block; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
        input { width: 100%; padding: 13px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #eef2ff; font-size: 0.9rem; outline: none; transition: all 0.2s ease; }
        input:focus { border-color: rgba(79,142,247,0.6); background: rgba(255,255,255,0.08); }
        input::placeholder { color: var(--text-muted); }
        .form-group { margin-bottom: 1.5rem; }
        .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 1rem 0 1.5rem; }
        .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #4a5568; margin-bottom: 12px; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 13px 20px; border-radius: 12px; font-weight: 600; font-size: 0.9rem; text-align: center; border: none; cursor: pointer; transition: all 0.2s ease; text-decoration: none; display: block; }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: var(--accent-blue-hover); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #6b7a99; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.09); color: #eef2ff; }
    </style>
</head>
<body>
    <nav class="topbar">
        <span class="topbar-brand">Reward Banking</span>
        <div style="display:flex; gap:12px; align-items:center;">
            <a href="/admin" class="topbar-back">← Back to Admin Panel</a>
            <span class="admin-badge">● Admin</span>
        </div>
    </nav>
    <main class="main">
        <div class="page-heading">
            <h1>Edit User</h1>
            <p>Modify account details for this user</p>
        </div>
        <div class="username-chip">@{{ target }}</div>
        {% if success %}
        <div class="server-success">✅ {{ success }}</div>
        {% endif %}
        {% if error %}
        <div class="server-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <div class="section-label">Account Info</div>
                <div class="field-wrap">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="text" placeholder="Password" value="{{ data[0] }}">
                </div>
                <div class="field-wrap">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" placeholder="Full Name" value="{{ data[1] }}">
                </div>
                <div class="two-col">
                    <div class="field-wrap">
                        <label for="age">Age</label>
                        <input id="age" name="age" type="number" placeholder="Age" value="{{ data[2] }}">
                    </div>
                    <div class="field-wrap">
                        <label for="address">Address</label>
                        <input id="address" name="address" placeholder="Address" value="{{ data[3] }}">
                    </div>
                </div>
                <div class="divider"></div>
                <div class="section-label">Balance &amp; Points</div>
                <div class="two-col">
                    <div class="field-wrap">
                        <label for="money">Balance (₱)</label>
                        <input id="money" name="money" type="number" placeholder="0" value="{{ data[4] }}">
                    </div>
                    <div class="field-wrap">
                        <label for="points">Points</label>
                        <input id="points" name="points" type="number" placeholder="0" value="{{ data[5] }}">
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-primary">Update</button>
                <a href="/admin" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>
</body>
</html>
