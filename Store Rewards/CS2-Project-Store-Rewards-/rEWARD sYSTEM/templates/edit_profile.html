<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
        .topbar { width: 100%; padding: 1.2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(6,9,18,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
        .topbar-brand { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; }
        .topbar-back { font-size: 0.82rem; color: #6b7a99; text-decoration: none; }
        .topbar-back:hover { color: #eef2ff; }
        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 3rem 2.5rem; max-width: 500px; width: 100%; margin: 0 auto; }
        .page-heading { margin-bottom: 2.5rem; }
        .page-heading h1 { font-family: 'Syne', sans-serif; font-size: 2.8rem; font-weight: 800; color: #fff; letter-spacing: -0.03em; margin-bottom: 0.3rem; }
        .page-heading p { color: #6b7a99; font-size: 0.95rem; }
        .username-chip { display: inline-block; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.25); color: #4f8ef7; border-radius: 20px; padding: 4px 14px; font-size: 0.82rem; font-weight: 700; margin-bottom: 1.5rem; }
        .server-error { background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); color: #ff4d6d; border-radius: 12px; padding: 14px 18px; font-size: 0.92rem; margin-bottom: 1.2rem; }
        .server-success { background: rgba(0,245,196,0.08); border: 1px solid rgba(0,245,196,0.25); color: #00f5c4; border-radius: 12px; padding: 14px 18px; font-size: 0.92rem; margin-bottom: 1.2rem; font-weight: 500; }
        .field-wrap { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        label { font-size: 0.8rem; font-weight: 600; color: #6b7a99; padding-left: 4px; display: block; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
        input { width: 100%; padding: 15px 18px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #eef2ff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: rgba(79,142,247,0.6); }
        input::placeholder { color: #4a5568; }
        .form-group { margin-bottom: 1.5rem; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 14px; font-weight: 600; font-size: 0.95rem; text-align: center; border: none; cursor: pointer; transition: all 0.2s ease; text-decoration: none; display: block; }
        .btn-primary { background: #4f8ef7; color: white; }
        .btn-primary:hover { background: #3a7ef0; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #6b7a99; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.09); color: #eef2ff; }
    </style>
</head>
<body>
    <nav class="topbar">
        <span class="topbar-brand">Reward Banking</span>
        <a href="/dashboard" class="topbar-back">← Back to Dashboard</a>
    </nav>
    <main class="main">
        <div class="page-heading">
            <h1>Edit Profile</h1>
            <p>Update your account information</p>
        </div>
        <div class="username-chip">@{{ username }}</div>
        {% if success %}
        <div class="server-success">✅ {{ success }}</div>
        {% endif %}
        {% if error %}
        <div class="server-error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <div class="field-wrap">
                    <label for="password">New Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter new password" value="{{ data[0] }}">
                </div>
                <div class="field-wrap">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" placeholder="Enter full name" value="{{ data[1] }}">
                </div>
                <div class="field-wrap">
                    <label for="age">Age</label>
                    <input id="age" name="age" type="number" placeholder="Enter age" value="{{ data[2] }}">
                </div>
                <div class="field-wrap">
                    <label for="address">Address</label>
                    <input id="address" name="address" placeholder="Enter address" value="{{ data[3] }}">
                </div>
            </div>
            <div class="btn-row">
                <button type="submit" class="btn btn-primary">Update</button>
                <a href="/dashboard" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </main>
</body>
</html>
